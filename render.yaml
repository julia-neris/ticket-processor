services:
  - type: web
    name: ticket-processor
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 120 --max-requests 50 --max-requests-jitter 10 --preload --log-level info --access-logfile - --error-logfile - wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: false
      - key: MAX_CONTENT_LENGTH
        value: 52428800
